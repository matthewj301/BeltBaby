
# ── Belt Printer Specific ────────────────────────────────────────────────────
[gcode_macro EJECT_PRINT]
description: Advance belt 200mm to eject the print
gcode:
    RELEASE_Z_BELT
    SAFE_PARK
    G91
    G1 Z200 F1200
    G90

[gcode_macro RELEASE_Z_BELT]
gcode:
    {% if 'z' not in printer.toolhead.homed_axes %}
        RESPOND PREFIX="Z not homed — releasing belt"
        SET_KINEMATIC_POSITION CLEAR=XY
    {% else %}
        RESPOND PREFIX="Z already homed — skipping release"
    {% endif %}

[gcode_macro NOZZLE_PRIME]
description: Purge nozzle before printing
variable_y_startheight: 15
variable_extrude_length: 25
gcode:
    {% set rand = range(0, (printer.toolhead.axis_maximum.x|int - 1))|random %}
    RESPOND PREFIX="NOZZLE_PRIME at X={rand}"
    {% set fan_speed = printer.fan.speed %}
    G90
    G0 X{rand} Y{y_startheight} F3000
    M106 S255
    SAFE_EXTRUDE
    G90
    M83
    G0 E5 Y0 Z8 F300
    G91
    G0 Z+15 E+{extrude_length - 5} F150
    G0 Y+15 Z+15 F3000
    G90
    G92 E0
    G92 Z0
    M106 S{(fan_speed * 255)|round|int}

[delayed_gcode Z_BELT_RELEASE]
initial_duration: 0.1
gcode:
    SET_KINEMATIC_POSITION CLEAR=XY
