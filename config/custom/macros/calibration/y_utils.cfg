# BabyBelt Pro — Y Offset Calibration Macros
# Use these to fine-tune the Y offset (belt squish) during a test print.
# Positive = less squish, Negative = more squish.

[gcode_macro Y_PLUS1]
gcode:
    RESPOND PREFIX="Notice: Y_Offset is now: ({ printer.gcode_move.homing_origin.y + 0.1 })"
    SET_GCODE_OFFSET Y_ADJUST=0.1

[gcode_macro Y_PLUS01]
gcode:
    RESPOND PREFIX="Notice: Y_Offset is now: ({ printer.gcode_move.homing_origin.y + 0.01 })"
    SET_GCODE_OFFSET Y_ADJUST=0.01

[gcode_macro Y_PLUS005]
gcode:
    RESPOND PREFIX="Notice: Y_Offset is now: ({ printer.gcode_move.homing_origin.y + 0.005 })"
    SET_GCODE_OFFSET Y_ADJUST=0.005

[gcode_macro Y_MINUS1]
gcode:
    RESPOND PREFIX="Notice: Y_Offset is now: ({ printer.gcode_move.homing_origin.y - 0.1 })"
    SET_GCODE_OFFSET Y_ADJUST=-0.1

[gcode_macro Y_MINUS01]
gcode:
    RESPOND PREFIX="Notice: Y_Offset is now: ({ printer.gcode_move.homing_origin.y - 0.01 })"
    SET_GCODE_OFFSET Y_ADJUST=-0.01

[gcode_macro Y_MINUS005]
gcode:
    RESPOND PREFIX="Notice: Y_Offset is now: ({ printer.gcode_move.homing_origin.y - 0.005 })"
    SET_GCODE_OFFSET Y_ADJUST=-0.005

# ── Angle Validation ────────────────────────────────────────────────────────

[gcode_macro Y_ANGLE]
variable_state: "45"
variable_angle: "0"
gcode:
    RESPOND PREFIX="Y Angle is: {state}"

[gcode_macro VALIDATE_ANGLE]
description: Verify gantry angle matches slicer setting
variable_validation_error: 0
gcode:
    SET_GCODE_VARIABLE MACRO=VALIDATE_ANGLE VARIABLE=validation_error VALUE=0
    {% set y_angle_state = printer["gcode_macro Y_ANGLE"].state|string %}
    {% set requested_angle = printer["gcode_macro Y_ANGLE"].angle|string %}

    {% if y_angle_state == requested_angle %}
        M117 Angle Verified
        RESPOND PREFIX="Angle Verified — continuing to print"
    {% else %}
        RESPOND PREFIX="Angle mismatch: printer={y_angle_state}, slicer={requested_angle}"
        SET_GCODE_VARIABLE MACRO=VALIDATE_ANGLE VARIABLE=validation_error VALUE=1
    {% endif %}