[gcode_macro SAFE_PARK]
description: Park nozzle away from print
gcode:
    {% set max_x = printer.toolhead.axis_maximum.x|float %}
    {% set max_y = printer.toolhead.axis_maximum.y|float %}
    {% set act_x = printer.toolhead.position.x|float %}
    {% set act_y = printer.toolhead.position.y|float %}
    {% set park_delta = 10|float %}

    {% if act_x >= max_x %}
        {% set x_safe = 0 %}
    {% elif act_x >= (max_x - park_delta) %}
        {% set x_safe = max_x - act_x %}
    {% else %}
        {% set x_safe = park_delta %}
    {% endif %}

    {% if act_y >= max_y %}
        {% set y_safe = 0 %}
    {% elif act_y >= (max_y - park_delta) %}
        {% set y_safe = max_y - act_y %}
    {% else %}
        {% set y_safe = park_delta %}
    {% endif %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        RESPOND PREFIX="Notice: Printer not homed, skipping SAFE_PARK"
    {% else %}
        G91
        G0 X{x_safe} Y{y_safe} F20000
        G90
        G0 X{max_x} Y{max_y} F3600
    {% endif %}